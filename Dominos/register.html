<html>
    <head>
        <title>REGISTER</title>
        <link rel="stylesheet" href="register.css">
    </head>
<body>
    <h1>Register into Domino's</h1>
    <form>
        
        <label>First Name :</label>
        <input type="text"  autofocus required placeholder="Enter your First name" autocomplete="off"> <br> <br>

        <label>Last Name :</label>
        <input type="text"  required placeholder="Enter your Last name"> <br> <br>

        <label name="gen">Gender :</label>
        <input type="radio" name="gen" required>Male 
        <input type="radio" name="gen" required>Female <br> <br>

        <label><abbr title="Date Of Birth ">DOB : </abbr></label>
        <input type="date" required minyear="1998" maxyear="2004"> <br> <br>

        <label>Address :</label>
        <textarea rows="1" cols="30" autocomplete="on" placeholder="Enter Your Address"></textarea> <br> <br>

        <label>City :</label>
        <select>
            <option value="Chennai">Chennai</option>
            <option value="Bangalore">Bangalore</option>
            <option value="Hyderabad">Hyderabad</option>
            <option value="Mumbai">Mumbai</option>
        </select> <br> <br>

        <label>Country Code :</label>
        <input type="pattern" required placeholder="Enter Your Country Code" > <br> <br>

        <label>Phone Number :</label>
        <input type="number" required placeholder="Enter Your Phone Number"> <br> <br>

        <label>E-Mail ID :</label>
        <input type="email" required placeholder="Enter Your E-Mail ID"> <br> <br>

        <label>Set Your Password :</label>
        <input type="password" placeholder="type your password"> <br> <br>

        <input type="submit">
</body>
</html>
